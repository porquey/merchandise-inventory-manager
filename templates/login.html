{% extends "base.html" %}

{% block content %}
<h1>{{ subtitle }}</h1>

{% if error.is_some() %}
<div class="notification error">
    {{ error.unwrap() }}
</div>
{% endif %}

<form action="/login" method="post">
    <label>Password: <input type="password" name="password" /></label>
    <button type="submit">Login</button>
</form>

<ul>
    <li><a href="/">Return Home</a></li>
</ul>
{% endblock %}
